<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phở Việt: Nguồn gốc và Biến tấu</title>
  <meta name="description" content="Trang nghiên cứu trực quan về nguồn gốc, khoa học nước dùng và sự khác biệt giữa Phở Bắc và Phở Nam.">
  <style>
    :root {
      --ink: #211f1d;
      --muted: #6b625b;
      --paper: #fffdf8;
      --surface: #ffffff;
      --line: #e6dfd5;
      --broth: #b56a25;
      --deep-red: #8b2f22;
      --leaf: #246b45;
      --gold-soft: #fff2d8;
      --shadow: 0 18px 50px rgba(44, 34, 24, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.68;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: var(--deep-red);
      text-underline-offset: 0.18em;
    }

    .wrap {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .hero {
      min-height: 92vh;
      display: grid;
      align-items: center;
      background:
        linear-gradient(90deg, rgba(19, 18, 16, 0.78), rgba(19, 18, 16, 0.5) 46%, rgba(19, 18, 16, 0.1)),
        url("pho-bac-pho-nam.jpeg") center / cover no-repeat;
      color: #fffaf2;
    }

    .hero__content {
      max-width: 780px;
      padding: 96px 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 4px 12px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      line-height: 1.08;
      letter-spacing: 0;
    }

    h1 {
      margin: 22px 0 18px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 8vw, 6.8rem);
      max-width: 920px;
    }

    .hero p {
      max-width: 720px;
      margin: 0;
      color: rgba(255, 250, 242, 0.86);
      font-size: clamp(1.05rem, 2vw, 1.3rem);
    }

    .hero__facts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 36px;
    }

    .fact {
      min-height: 108px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
    }

    .fact strong {
      display: block;
      color: #fff;
      font-size: 1.7rem;
      line-height: 1.1;
    }

    .fact span {
      display: block;
      margin-top: 8px;
      color: rgba(255, 250, 242, 0.78);
      font-size: 0.92rem;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.94);
      backdrop-filter: blur(10px);
    }

    .nav__inner {
      display: flex;
      gap: 10px;
      align-items: center;
      overflow-x: auto;
      padding: 12px 0;
    }

    .nav a {
      flex: 0 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
    }

    .nav a:hover,
    .nav a:focus-visible {
      background: var(--gold-soft);
      outline: none;
    }

    .language-switcher {
      margin-left: auto;
      display: inline-flex;
      flex: 0 0 auto;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }

    .language-switcher button {
      min-width: 44px;
      min-height: 34px;
      padding: 6px 10px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .language-switcher button[aria-pressed="true"] {
      background: var(--deep-red);
      color: #fffaf2;
    }

    .language-switcher button:focus-visible {
      outline: 2px solid var(--broth);
      outline-offset: 2px;
    }

    main {
      padding: 84px 0 0;
    }

    section {
      margin-bottom: 96px;
    }

    .section-head {
      max-width: 780px;
      margin-bottom: 34px;
    }

    .kicker {
      margin: 0 0 10px;
      color: var(--deep-red);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 4vw, 4rem);
    }

    .section-head p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .lead-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 28px;
      align-items: start;
    }

    .prose,
    .note,
    .timeline article,
    .science article,
    blockquote {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .prose {
      padding: 30px;
      box-shadow: var(--shadow);
    }

    .prose h3,
    .science h3 {
      margin: 0 0 12px;
      font-family: Georgia, "Times New Roman", serif;
    }

    .prose h3 {
      font-size: 1.55rem;
    }

    .prose p {
      margin: 0 0 18px;
      color: #36302b;
    }

    .prose p:last-child {
      margin-bottom: 0;
    }

    .note {
      padding: 24px;
      border-color: #d9c39e;
      background: var(--gold-soft);
    }

    .note strong {
      display: block;
      margin-bottom: 8px;
      color: var(--deep-red);
      font-size: 1.05rem;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .timeline article {
      padding: 22px;
    }

    .timeline strong {
      display: block;
      color: var(--deep-red);
      font-size: 1.05rem;
    }

    .timeline span {
      display: block;
      margin: 10px 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .timeline p,
    .science p,
    .note p,
    blockquote p {
      margin: 0;
      color: var(--muted);
    }

    .science {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .science article {
      min-height: 260px;
      padding: 24px;
    }

    .science h3 {
      font-size: 1.35rem;
    }

    .compare-layout {
      display: grid;
      gap: 24px;
    }

    .photo-compare {
      overflow: hidden;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #11100f;
      box-shadow: var(--shadow);
    }

    .photo-frame {
      position: relative;
      background: #11100f;
    }

    .photo-frame img {
      width: 100%;
      height: auto;
    }

    .label {
      position: absolute;
      top: 16px;
      max-width: calc(50% - 26px);
      padding: 10px 12px;
      border-radius: 999px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 800;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
    }

    .label--north {
      left: 16px;
      background: rgba(139, 47, 34, 0.94);
    }

    .label--south {
      right: 16px;
      background: rgba(36, 107, 69, 0.94);
    }

    .photo-caption {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      color: #fffaf2;
    }

    .photo-caption div {
      padding: 20px;
    }

    .photo-caption div + div {
      border-left: 1px solid rgba(255, 255, 255, 0.14);
    }

    .photo-caption strong {
      display: block;
      margin-bottom: 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.25rem;
    }

    .photo-caption p {
      margin: 0;
      color: rgba(255, 250, 242, 0.78);
      font-size: 0.95rem;
    }

    .comparison-table {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .comparison-row {
      display: grid;
      grid-template-columns: 0.8fr 1fr 1fr;
      border-top: 1px solid var(--line);
    }

    .comparison-row:first-child {
      border-top: 0;
      background: var(--ink);
      color: #fffaf2;
      font-weight: 800;
    }

    .comparison-row > div {
      padding: 18px;
    }

    .comparison-row > div + div {
      border-left: 1px solid var(--line);
    }

    .comparison-row:first-child > div + div {
      border-left-color: rgba(255, 255, 255, 0.18);
    }

    .comparison-row:not(:first-child) > div:first-child {
      color: var(--deep-red);
      font-weight: 800;
    }

    .profile {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 24px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .profile__tabs {
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .tab {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      text-align: left;
      font-weight: 800;
    }

    .tab[aria-selected="true"] {
      border-color: var(--deep-red);
      background: var(--gold-soft);
      color: var(--deep-red);
    }

    .bars {
      display: grid;
      gap: 14px;
    }

    .bar {
      display: grid;
      gap: 7px;
    }

    .bar__top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: var(--muted);
      font-size: 0.93rem;
      font-weight: 700;
    }

    .bar__track {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: #eee8df;
    }

    .bar__fill {
      width: var(--value);
      height: 100%;
      border-radius: inherit;
      background: var(--deep-red);
      transition: width 240ms ease;
    }

    .bar--south .bar__fill {
      background: var(--leaf);
    }

    .quote-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    blockquote {
      margin: 0;
      padding: 24px;
    }

    blockquote footer {
      margin-top: 18px;
      color: var(--deep-red);
      font-weight: 800;
    }

    .references {
      padding: 54px 0 70px;
      border-top: 1px solid var(--line);
      background: #f7f2eb;
    }

    .references h2 {
      margin-bottom: 22px;
      font-size: clamp(1.7rem, 3vw, 2.4rem);
    }

    .references ol {
      display: grid;
      gap: 10px;
      margin: 0;
      padding-left: 22px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 900px) {
      .hero {
        min-height: auto;
      }

      .hero__facts,
      .lead-grid,
      .timeline,
      .science,
      .profile,
      .quote-grid {
        grid-template-columns: 1fr;
      }

      .language-switcher {
        margin-left: 0;
      }
    }

    @media (max-width: 680px) {
      .wrap {
        width: min(100% - 28px, 1120px);
      }

      main {
        padding-top: 56px;
      }

      section {
        margin-bottom: 72px;
      }

      .hero__content {
        padding: 74px 0;
      }

      .fact,
      .prose,
      .note,
      .science article,
      .timeline article,
      .photo-caption div,
      .comparison-row > div {
        padding: 16px;
      }

      .photo-caption,
      .comparison-row {
        grid-template-columns: 1fr;
      }

      .photo-caption div + div,
      .comparison-row > div + div {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .photo-caption div + div {
        border-top-color: rgba(255, 255, 255, 0.14);
      }

      .label {
        position: static;
        display: inline-flex;
        max-width: none;
        margin: 10px 0 0 10px;
      }

      .label--south {
        margin-left: 6px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="wrap hero__content">
      <span class="eyebrow" id="hero-eyebrow"></span>
      <h1 id="hero-title"></h1>
      <p id="hero-copy"></p>
      <div class="hero__facts" id="hero-facts" aria-label="Key facts"></div>
    </div>
  </header>

  <nav class="nav" aria-label="Site navigation">
    <div class="wrap nav__inner">
      <a href="#dan-nhap" id="nav-intro"></a>
      <a href="#nguon-goc" id="nav-origin"></a>
      <a href="#khoa-hoc" id="nav-science"></a>

  <main id="main-content"></main>

  <footer class="references">
    <div class="wrap">
      <h2 id="references-title"></h2>
      <ol id="references-list"></ol>
    </div>
  </footer>

              ["Claro no significa débil", "Un caldo claro no tiene proteínas coaguladas flotando ni grasa emulsionada. Por eso se cuece a fuego suave, se espuma constantemente y se evita el hervor fuerte que enturbia y pesa el sabor."]

    const main = document.querySelector("#main-content");
    const languageSwitcher = document.querySelector("#language-switcher");
    let activeLanguage = localStorage.getItem("pho-language") || "vi";

    function createEl(tag, className, text) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text !== undefined) el.textContent = text;
      return el;
    }

    function sectionHead(section) {
      const head = createEl("div", "section-head");
      head.append(createEl("p", "kicker", section.kicker));
      head.append(createEl("h2", "", section.title));
      head.append(createEl("p", "", section.intro));
      return head;
    }

    function renderLead(section) {
      const grid = createEl("div", "lead-grid");
      const prose = createEl("article", "prose");
      prose.append(createEl("h3", "", section.proseTitle));
      section.paragraphs.forEach((paragraph) => prose.append(createEl("p", "", paragraph)));

      const note = createEl("aside", "note");
      note.append(createEl("strong", "", section.noteTitle));
      note.append(createEl("p", "", section.note));
      grid.append(prose, note);
      return grid;
    }

    function renderTimeline(section) {
      const grid = createEl("div", "timeline");
      section.cards.forEach(([title, subtitle, copy]) => {
        const article = createEl("article");
        article.append(createEl("strong", "", title));
        article.append(createEl("span", "", subtitle));
        article.append(createEl("p", "", copy));
        grid.append(article);
      });
      return grid;
    }

    function renderScience(section) {
      const grid = createEl("div", "science");
      section.cards.forEach(([title, copy]) => {
        const article = createEl("article");
        article.append(createEl("h3", "", title));
        article.append(createEl("p", "", copy));
        grid.append(article);
      });
      return grid;
    }

    function renderProse(section) {
      const article = createEl("article", "prose");
      article.append(createEl("h3", "", section.proseTitle));
      section.paragraphs.forEach((paragraph) => article.append(createEl("p", "", paragraph)));
      return article;
    }

    function renderQuotes(section) {
      const grid = createEl("div", "quote-grid");
      section.quotes.forEach(([quote, author]) => {
        const blockquote = createEl("blockquote");
        blockquote.append(createEl("p", "", quote));
        blockquote.append(createEl("footer", "", author));
        grid.append(blockquote);
      });
      return grid;
    }

    function renderComparison(section) {
      const outer = createEl("div", "compare-layout");
      const figure = createEl("figure", "photo-compare");
      const frame = createEl("div", "photo-frame");
      frame.append(createEl("span", "label label--north", section.labels[0]));
      frame.append(createEl("span", "label label--south", section.labels[1]));
      const img = document.createElement("img");
      img.src = "pho-bac-pho-nam.jpeg";
      img.alt = section.imageAlt;
      frame.append(img);

      const caption = createEl("figcaption", "photo-caption");
      section.captions.forEach(([title, copy]) => {
        const div = createEl("div");
        div.append(createEl("strong", "", title));
        div.append(createEl("p", "", copy));
        caption.append(div);
      });
      figure.append(frame, caption);

      const table = createEl("div", "comparison-table");
      table.setAttribute("role", "table");
      table.setAttribute("aria-label", section.title);
      const header = createEl("div", "comparison-row");
      header.setAttribute("role", "row");
      section.tableHeaders.forEach((label) => {
        const cell = createEl("div", "", label);
        cell.setAttribute("role", "columnheader");
        header.append(cell);
      });
      table.append(header);
      section.tableRows.forEach((row) => {
        const rowEl = createEl("div", "comparison-row");
        rowEl.setAttribute("role", "row");
        row.forEach((text) => {
          const cell = createEl("div", "", text);
          cell.setAttribute("role", "cell");
          rowEl.append(cell);
        });
        table.append(rowEl);
      });

      const profile = createEl("div", "profile");
      const tabs = createEl("div", "profile__tabs");
      tabs.setAttribute("role", "tablist");
      tabs.setAttribute("aria-label", section.title);
      const bars = createEl("div", "bars");
      const northButton = createEl("button", "tab", section.profileTabs[0]);
      const southButton = createEl("button", "tab", section.profileTabs[1]);
      northButton.type = "button";
      southButton.type = "button";
      northButton.setAttribute("role", "tab");
      southButton.setAttribute("role", "tab");
      tabs.append(northButton, southButton);
      profile.append(tabs, bars);

      function renderBars(region) {
        const isNorth = region === "north";
        northButton.setAttribute("aria-selected", isNorth ? "true" : "false");
        southButton.setAttribute("aria-selected", isNorth ? "false" : "true");
        bars.innerHTML = "";
        section.profileRows.forEach(([label, north, south]) => {
          const value = isNorth ? north : south;
          const row = createEl("div", isNorth ? "bar" : "bar bar--south");
          const top = createEl("div", "bar__top");
          top.append(createEl("span", "", label));
          top.append(createEl("span", "", `${value}${content[activeLanguage].profileUnit}`));
          const track = createEl("div", "bar__track");
          track.setAttribute("aria-hidden", "true");
          const fill = createEl("div", "bar__fill");
          fill.style.setProperty("--value", `${value}%`);
          track.append(fill);
          row.append(top, track);
          bars.append(row);
        });
      }

      northButton.addEventListener("click", () => renderBars("north"));
      southButton.addEventListener("click", () => renderBars("south"));
      renderBars("north");

      outer.append(figure, table, profile);
      return outer;
    }

    function renderSection(section) {
      const wrapper = createEl("section", "wrap");
      wrapper.id = section.id;
      wrapper.append(sectionHead(section));

      const renderers = {
        lead: renderLead,
        timeline: renderTimeline,
        science: renderScience,
        compare: renderComparison,
        prose: renderProse,
        quotes: renderQuotes
      };
      wrapper.append(renderers[section.layout](section));
      return wrapper;
    }

    function renderReferences(copy) {
      document.querySelector("#references-title").textContent = copy.referencesTitle;
      const list = document.querySelector("#references-list");
      list.innerHTML = "";
      references.forEach(([label, url]) => {
        const li = createEl("li");
        const link = createEl("a", "", label);
        link.href = url;
        link.target = "_blank";
        link.rel = "noreferrer";
        li.append(link);
        list.append(li);
      });
    }

    function renderLanguageSwitcher(copy) {
      languageSwitcher.setAttribute("aria-label", copy.languageLabel);
      languageSwitcher.innerHTML = "";
      languages.forEach((language) => {
        const button = createEl("button", "", language.label);
        button.type = "button";
        button.setAttribute("aria-label", language.name);
        button.setAttribute("aria-pressed", language.code === activeLanguage ? "true" : "false");
        button.addEventListener("click", () => setLanguage(language.code));
        languageSwitcher.append(button);
      });
    }

    function setLanguage(languageCode) {
      activeLanguage = content[languageCode] ? languageCode : "vi";
      localStorage.setItem("pho-language", activeLanguage);
      const copy = content[activeLanguage];
      document.documentElement.lang = activeLanguage;
      document.title = copy.metaTitle;
      document.querySelector('meta[name="description"]').setAttribute("content", copy.metaDescription);
      document.querySelector(".nav").setAttribute("aria-label", copy.navLabel);
      document.querySelector("#hero-eyebrow").textContent = copy.hero.eyebrow;
      document.querySelector("#hero-title").textContent = copy.hero.title;
      document.querySelector("#hero-copy").textContent = copy.hero.copy;
      document.querySelector("#hero-facts").innerHTML = "";
      copy.hero.facts.forEach(([number, label]) => {
        const fact = createEl("div", "fact");
        fact.append(createEl("strong", "", number));
        fact.append(createEl("span", "", label));
        document.querySelector("#hero-facts").append(fact);
      });
      ["intro", "origin", "science", "compare", "memory", "literature", "summary"].forEach((key, index) => {
        document.querySelector(`#nav-${key}`).textContent = copy.nav[index];
      });
      renderLanguageSwitcher(copy);
      main.innerHTML = "";
      copy.sections.forEach((section) => main.append(renderSection(section)));
      renderReferences(copy);
    }

    setLanguage(activeLanguage);
  </script>
</body>
